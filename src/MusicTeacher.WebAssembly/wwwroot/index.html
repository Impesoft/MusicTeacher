<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MusicTeacher</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="MusicTeacher.WebAssembly.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
    <script type="importmap"></script>
    <script>
        (() => {
            const mode = localStorage.getItem('music-teacher-color-mode');
            if (mode === 'light' || mode === 'dark') {
                document.documentElement.dataset.colorMode = mode;
            }

            const theme = localStorage.getItem('music-teacher-visual-theme');
            const themes = ['anime-sky', 'manga-night', 'candy-stage', 'starship', 'forest-band', 'city-pop', 'sticker-wall', 'ocean-show'];
            if (themes.includes(theme)) {
                document.documentElement.dataset.visualTheme = theme;
            }
        })();
    </script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">x</span>
    </div>
    <script src="js/music-audio.js"></script>
    <script>
        window.musicTeacherColorMode = {
            get: () => localStorage.getItem('music-teacher-color-mode') ?? 'system',
            set: mode => {
                if (mode === 'light' || mode === 'dark') {
                    localStorage.setItem('music-teacher-color-mode', mode);
                    document.documentElement.dataset.colorMode = mode;
                    return;
                }

                localStorage.removeItem('music-teacher-color-mode');
                delete document.documentElement.dataset.colorMode;
            }
        };
        window.musicTeacherProfile = {
            setVisualTheme: theme => {
                const themes = ['anime-sky', 'manga-night', 'candy-stage', 'starship', 'forest-band', 'city-pop', 'sticker-wall', 'ocean-show'];
                if (themes.includes(theme)) {
                    document.documentElement.dataset.visualTheme = theme;
                    return;
                }

                delete document.documentElement.dataset.visualTheme;
            }
        };
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js" autostart="false"></script>
    <script>
        Blazor.start({
            configureRuntime: dotnet => dotnet.withConfig({ loadAllSatelliteResources: true })
        });
    </script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
</body>

</html>
